name = "kairos"
version = "0.1.0"
licences = ["Apache-2.0"]
description = "A background job runner for Gleam."
repository = { type = "github", user = "ccarvalho-eng", repo = "kairos" }

[dependencies]
exception = ">= 2.1.0 and < 3.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
